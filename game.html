<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>NEON ROGUE // 2077</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; overflow:hidden; }
  body {
    background:#0a0014;
    font-family: 'Courier New', monospace;
    color:#0ff;
    user-select:none;
    image-rendering: pixelated;
  }
  #game {
    display:block;
    width:100vw;
    height:100vh;
    background:#05000d;
    cursor: crosshair;
    pointer-events: none;
  }
  #ui {
    position:fixed;
    top:10px; left:10px;
    background: rgba(10,0,20,0.85);
    border:1px solid #0ff;
    padding:10px 15px;
    font-size:14px;
    text-shadow: 0 0 5px #0ff;
    min-width: 220px;
    z-index: 10;
  }
  #ui div { margin:3px 0; }
  .bar {
    width:200px; height:12px;
    background:rgba(32,0,0,0.7);
    border:1px solid #f0f;
    position:relative;
  }
  .bar > div { height:100%; transition: width 0.1s; }
  #hpBar > div { background: linear-gradient(90deg,#f00,#f0f); box-shadow:0 0 8px #f0f;}
  #xpBar > div { background: linear-gradient(90deg,#0ff,#0f0); box-shadow:0 0 8px #0ff;}
  .bar-text {
    position:absolute;
    right:4px;
    top:50%;
    transform:translateY(-50%);
    font-size:10px;
    color:#fff;
    text-shadow:0 0 3px #000, 0 0 6px #000;
    pointer-events:none;
    font-family: 'Courier New', monospace;
    white-space:nowrap;
  }
  #weapon {
    position:fixed;
    bottom:10px; left:10px;
    background: rgba(10,0,20,0.85);
    border:1px solid #f0f;
    padding:10px 15px;
    font-size:13px;
    text-shadow: 0 0 5px #f0f;
    z-index: 10;
  }
  #chargeBar {
    position:fixed;
    bottom:100px; left:50%;
    transform:translateX(-50%);
    width:200px; height:8px;
    background:#200; border:1px solid #ff0; display:none;
    z-index: 10;
  }
  #chargeBar > div { height:100%; background:linear-gradient(90deg,#f00,#ff0); width:0%; }
  #msg {
    position:fixed;
    top:50%; left:50%;
    transform:translate(-50%,-50%);
    font-size:40px;
    color:#ff0;
    text-shadow: 0 0 20px #f0f, 0 0 40px #0ff;
    pointer-events:none;
    opacity:0;
    transition: opacity 0.5s;
    text-align:center;
    letter-spacing:4px;
    z-index: 20;
  }
  #msg.show { opacity:1; }
  #controls {
    position:fixed;
    bottom:10px; right:10px;
    background: rgba(10,0,20,0.85);
    border:1px solid #0ff;
    padding:8px 12px;
    font-size:11px;
    color:#0ff;
    z-index: 10;
  }
  .key { color:#ff0; font-weight:bold; }
  #start {
    position:fixed;
    inset:0;
    background: radial-gradient(circle, #200040 0%, #000 100%);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    z-index:200;
  }
  #start h1 { font-size:60px; color:#f0f; text-shadow: 0 0 20px #f0f, 0 0 40px #0ff; letter-spacing:8px; margin-bottom:20px; animation: flicker 2s infinite; }
  #start p { color:#0ff; margin:10px; font-size:16px; }
  #classSelect { display:flex; gap:20px; margin-top:30px; justify-content: center; flex-wrap: wrap; }
  .classBtn {
    padding:20px; background:transparent; border:2px solid;
    font-family:inherit; font-size:14px; letter-spacing:2px; cursor:pointer; transition: all 0.3s;
    width:180px; text-align:left;
  }
  .classBtn:hover { transform:scale(1.05); box-shadow: 0 0 30px currentColor; }
  .classBtn .cname { font-size:18px; font-weight:bold; display:block; margin-bottom:8px; }
  .classBtn .cdesc { font-size:10px; opacity:0.8; line-height:1.4; }

  #abilityBar {
    position:fixed;
    bottom:60px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:10px;
    z-index:10;
    pointer-events:none;
  }
  .ab-slot {
    width:56px; height:56px;
    background:rgba(10,0,20,0.85);
    border:2px solid #333;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    position:relative;
    transition: border-color 0.2s;
  }
  .ab-slot .ab-key { color:#ff0; font-size:16px; font-weight:bold; }
  .ab-slot .ab-name { color:#0ff; font-size:8px; text-align:center; line-height:1.1; margin-top:2px; }
  .ab-slot .ab-cd-overlay {
    position:absolute; inset:0;
    background:rgba(0,0,0,0.7);
    display:none;
  }
  .ab-slot .ab-cd-text {
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    color:#ff0; font-size:14px; font-weight:bold;
    text-shadow:0 0 5px #f0f;
    z-index:1;
  }
  .ab-slot.ult-slot { border-color:#f0f; }
  .ab-slot.ult-slot .ab-key { color:#f0f; }
  @keyframes flicker { 0%,100% { opacity:1; } 50% { opacity:0.85; } }

  /* Pickup Menu */
  #pickupMenu {
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.95);
    display:none;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    z-index:200;
    font-family: inherit;
  }
  #pickupMenu.show { display:flex; }
  #pickupMenu .itemName { font-size:28px; color:#f0f; text-shadow:0 0 20px #f0f; margin-bottom:10px; text-align:center; }
  #pickupMenu .itemStats { font-size:16px; color:#0ff; text-shadow:0 0 10px #0ff; margin-bottom:30px; line-height:1.8; text-align:center; }
  #pickupMenu .btns { display:flex; gap:30px; }
  #pickupMenu button {
    padding:15px 40px;
    font-family:inherit;
    font-size:18px;
    border:2px solid;
    background:transparent;
    color:#0ff;
    cursor:pointer;
    transition:all 0.2s;
    letter-spacing:2px;
  }
  #pickupMenu button:hover { transform:scale(1.1); box-shadow:0 0 30px currentColor; }
  #pickupMenu #btnTake { border-color:#0f0; color:#0f0; }
  #pickupMenu #btnSkip { border-color:#f00; color:#f00; }
  #pickupMenu .keyHint { color:#ff0; margin-top:20px; font-size:14px; }

  /* Implant UI */
  #implants {
    position:fixed;
    top:10px; right:10px;
    background: rgba(10,0,20,0.85);
    border:1px solid #0ff;
    padding:10px;
    font-size:12px;
    z-index:10;
    min-width:180px;
  }
  #implants h3 { color:#ff0; text-shadow:0 0 10px #ff0; margin-bottom:8px; font-size:14px; text-align:center; }
  .implant-slot { margin:4px 0; padding:4px 8px; background:rgba(0,0,0,0.5); border:1px solid #333; display:flex; justify-content:space-between; align-items:center; }
  .implant-name { color:#0ff; font-size:11px; }
  .implant-count { color:#ff0; font-size:11px; font-weight:bold; }
  .implant-stack { color:#888; font-size:10px; }
  
  /* Minimap */
  #minimap {
    position:fixed;
    top:10px; right:210px;
    width:180px; height:180px;
    background:rgba(0,0,0,0.8);
    border:1px solid #f0f;
    z-index:10;
    image-rendering: pixelated;
  }
  
  #debug {
    position:fixed;
    bottom:10px; left:50%;
    transform:translateX(-50%);
    background:rgba(10,0,20,0.85);
    border:1px solid #0ff;
    padding:5px 10px;
    font-size:10px;
    color:#0ff;
    z-index:10;
  }
  #skillMenu {
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.95);
    display:none;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    z-index:200;
    font-family: 'Courier New', monospace;
    overflow-y:auto;
  }
  #skillMenu.show { display:flex; }
  #skillMenu h2 { color:#ff0; text-shadow:0 0 15px #ff0; font-size:28px; letter-spacing:4px; margin-bottom:5px; }
  #skillMenu .skill-points { color:#0ff; font-size:16px; margin-bottom:12px; text-shadow:0 0 10px #0ff; }
  #skillTabs {
    display:flex;
    gap:20px;
    justify-content:center;
    width:100%;
    margin:0 0 20px 0;
  }
  #skillTabs button{
    padding:10px 20px;
    border:2px solid #333;
    background:transparent;
    color:#0ff;
    cursor:pointer;
    font-family:inherit;
    transition: all 0.15s;
  }
  #skillTabs button.active{
    border-color:#0ff;
    box-shadow:0 0 15px rgba(0,255,255,0.15);
  }
  #skillTabs button:hover{
    transform:scale(1.03);
    border-color:#0ff;
  }
  .skill-columns { display:flex; gap:30px; }
  .skill-col { display:flex; flex-direction:column; align-items:center; gap:0; }

  /* Только для вкладки АТАКА (ЛКМ): змейка */
  #skillMenu.attackMode .skill-columns {
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:14px;
    padding:0 10px;
  }
  #skillMenu.attackMode .skill-col {
    width:260px;
    align-items:center;
  }

  #skillMenu.attackMode .skill-row {
    width: 100%;
    display:flex;
    justify-content:center;
    gap: 40px;
    position: relative;
  }
  #skillMenu.attackMode .skill-row.top { margin-top: 10px; }
  #skillMenu.attackMode .skill-row.bottom { margin-top: 10px; }

  #skillMenu.attackMode .skill-col {
    position: relative;
  }

  .skill-col-title { color:#f0f; font-size:14px; font-weight:bold; text-shadow:0 0 10px #f0f; margin-bottom:10px; border-bottom:1px solid #f0f; padding-bottom:5px; text-align:center; }
  .skill-connector { width:2px; height:12px; background:#333; }
  .skill-connector.unlocked { background:#0ff; box-shadow:0 0 5px #0ff; }
  .skill-connector-line {
    position:absolute;
    background:#333;
    z-index:0;
  }
  .skill-connector-line.unlocked {
    background:#0ff;
    box-shadow: 0 0 8px #0ff;
  }
  .h-line {
    height:3px;
    width:40px;
    top:50%;
    transform:translateY(-50%);
  }
  .h-line.left { left:-40px; }
  .h-line.right { right:-40px; }
  .v-line {
    width:3px;
    height:40px;
    left:50%;
    transform:translateX(-50%);
  }
  .v-line.top { top:-40px; }
  .v-line.bottom { bottom:-40px; }
  .corner-line {
    position:absolute;
    width:43px;
    height:43px;
    border:3px solid #333;
    z-index:0;
    pointer-events:none;
  }
  .corner-line.unlocked {
    border-color:#0ff;
    box-shadow:0 0 8px #0ff;
  }
  .corner-line.top-right {
    top:-40px;
    right:-40px;
    border-left:none;
    border-bottom:none;
    border-top-right-radius:20px;
  }
  .corner-line.bottom-left {
    bottom:-40px;
    left:-40px;
    border-right:none;
    border-top:none;
    border-bottom-left-radius:20px;
  }

  .skill-node {
    width:180px; padding:10px;
    background:rgba(20,0,40,0.9);
    border:2px solid #333;
    text-align:center;
    cursor:pointer;
    transition: all 0.2s;
  }
  .skill-node:hover { border-color:#0ff; box-shadow:0 0 15px rgba(0,255,255,0.3); transform:scale(1.03); }
  .skill-node.unlocked { border-color:#0ff; background:rgba(0,80,80,0.3); }
  .skill-node.locked { opacity:0.4; cursor:default; pointer-events:none; }
  .skill-node.maxed { border-color:#ff0; background:rgba(80,80,0,0.3); cursor:default; }
  .skill-node .sn-name { color:#0ff; font-size:11px; font-weight:bold; margin-bottom:4px; }
  .skill-node .sn-desc { color:#aaa; font-size:9px; line-height:1.3; }
  .skill-node .sn-cost { color:#ff0; font-size:9px; margin-top:4px; }
  .skill-node .sn-level { color:#0ff; font-size:9px; }
  #skillMenu .close-hint { color:#888; font-size:12px; margin-top:20px; }
</style>
</head>
<body>

<div id="start">
  <h1>NEON ROGUE</h1>
  <p>// ВЫБЕРИ КЛАСС //</p>
  <div id="classSelect">
    <button class="classBtn" style="border-color:#f0f; color:#f0f" onmouseover="playSound('ui_hover')" onclick="startGame('melee')">
      <span class="cname">ЭДЖРАННЕР</span>
      <span class="cdesc">Ближний бой, высокий урон<br>SHIFT-РЫВОК  ЛКМ-РАЗРЕЗ  ПКМ-НОЖИ  3-МЕЧИ</span>
    </button>
    <button class="classBtn" style="border-color:#a0f; color:#a0f" onmouseover="playSound('ui_hover')" onclick="startGame('magic')">
      <span class="cname">НЕТРАННЕР</span>
      <span class="cdesc">Взлом, кибернетика<br>SHIFT-РЫВОК  1-ВЗЛОМ  2-ДЕМОН  3-СТЕНА</span>
    </button>
    <button class="classBtn" style="border-color:#ff0; color:#ff0" onmouseover="playSound('ui_hover')" onclick="startGame('tech')">
      <span class="cname">ТЕХНИК</span>
      <span class="cdesc">Пистолет, щит, гаджеты<br>SHIFT-РЫВОК  ЛКМ-ПИСТОЛЕТ  ПКМ-ЩИТ  1-ТУРЕЛЬ  2-ДРОН  3-МЕХ</span>
    </button>
  </div>
</div>

<canvas id="game" width="960" height="600"></canvas>
<canvas id="minimap" width="180" height="180"></canvas>

<div id="ui">
  <div>УРОВЕНЬ: <span id="lvl" style="color:#ff0">1</span></div>
  <div>УБИЙСТВ: <span id="kills">0</span></div>
  <div>ОЧКИ: <span id="skillPts" style="color:#0f0">0</span></div>
</div>

<div id="topStats" style="position:fixed; top:10px; left:50%; transform:translateX(-50%); display:flex; flex-direction:column; align-items:center; gap:4px; z-index:10; pointer-events:none;">
  <div id="timer" style="color:#ff0; text-shadow:0 0 10px #ff0; font-size:20px; font-weight:bold; letter-spacing:2px;">00:00</div>
  <div id="waveInfo" style="color:#0ff; text-shadow:0 0 5px #0ff; font-size:12px;">ВОЛНА 1</div>
</div>

<div id="topBars" style="position:fixed; top:60px; left:50%; transform:translateX(-50%); display:flex; flex-direction:column; align-items:center; gap:4px; z-index:10; pointer-events:none;">
  <div style="display:flex; align-items:center; gap:10px;">
    <div style="color:#f00; text-shadow:0 0 5px #f00; font-size:14px; min-width:30px;">HP</div>
    <div class="bar" id="hpBar" style="width:300px;"><div style="width:100%"></div><span id="hpText" class="bar-text"></span></div>
  </div>
  <div style="display:flex; align-items:center; gap:10px;">
    <div style="color:#0ff; text-shadow:0 0 5px #0ff; font-size:14px; min-width:30px;">XP</div>
    <div class="bar" id="xpBar" style="width:300px;"><div style="width:0%"></div><span id="xpText" class="bar-text"></span></div>
  </div>
</div>

<div id="implants">
  <h3>ИМПЛАНТЫ</h3>
  <div id="implantList"></div>
</div>

<div id="weapon">
  <div style="color:#ff0">ОРУЖИЕ:</div>
  <div id="wName">-</div>
  <div id="wType" style="color:#f0f">-</div>
</div>

<div id="abilityBar">
  <div class="ab-slot" id="abShift"><span class="ab-key">⇧</span><span class="ab-name">РЫВОК</span><div class="ab-cd-overlay" id="abShiftCd"></div><span class="ab-cd-text" id="abShiftCdTxt"></span></div>
  <div class="ab-slot" id="ab1"><span class="ab-key">1</span><span class="ab-name" id="ab1Name">-</span><div class="ab-cd-overlay" id="ab1Cd"></div><span class="ab-cd-text" id="ab1CdTxt"></span></div>
  <div class="ab-slot" id="ab2"><span class="ab-key">2</span><span class="ab-name" id="ab2Name">-</span><div class="ab-cd-overlay" id="ab2Cd"></div><span class="ab-cd-text" id="ab2CdTxt"></span></div>
  <div class="ab-slot ult-slot" id="abR"><span class="ab-key">3</span><span class="ab-name" id="abRName">-</span><div class="ab-cd-overlay" id="abRCd"></div><span class="ab-cd-text" id="abRCdTxt"></span></div>
</div>

<div id="chargeBar"><div></div></div>

<div id="controls">
  <span class="key">WASD</span> ДВИЖЕНИЕ
  <span class="key">ЛКМ</span> АТАКА
  <span class="key">1</span> <span class="key">2</span> СПОСОБНОСТИ
  <span class="key">3</span> УЛЬТА (НАКОПИТЬ)
  <span class="key">SHIFT</span> РЫВОК
  <span class="key">E</span> ПРОКАЧКА
  <span class="key">F</span> ВЗЯТЬ
</div>

<div id="msg"></div>

<div id="pickupMenu">
  <div class="itemName" id="pickupName"></div>
  <div class="itemStats" id="pickupStats"></div>
  <div class="btns">
    <button id="btnTake" onmouseover="playSound('ui_hover')" onclick="takePickup()">ВЗЯТЬ (F)</button>
    <button id="btnSkip" onmouseover="playSound('ui_hover')" onclick="skipPickup()">ОТКАЗАТЬСЯ (ESC)</button>
  </div>
  <div class="keyHint">F - взять | ESC - отказаться</div>
</div>

<div id="debug"></div>

<div id="deathScreen" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:300; flex-direction:column; align-items:center; justify-content:center;">
  <div style="font-size:48px; color:#f00; text-shadow:0 0 20px #f00, 0 0 40px #f00; margin-bottom:20px; font-family:'Courier New',monospace;">ПОРАЖЕНИЕ</div>
  <div id="deathKills" style="font-size:20px; color:#ff0; text-shadow:0 0 10px #ff0; margin-bottom:30px; font-family:'Courier New',monospace;"></div>
  <button onmouseover="playSound('ui_hover'); this.style.boxShadow='0 0 30px #0ff'" onmouseout="this.style.boxShadow='none'" onclick="location.reload()" style="padding:15px 40px; font-family:'Courier New',monospace; font-size:20px; border:2px solid #0ff; background:transparent; color:#0ff; cursor:pointer; letter-spacing:3px; transition:all 0.2s;">ПЕРЕЗАГРУЗИТЬ</button>
</div>

<div id="skillMenu">
  <h2>ПРОКАЧКА</h2>
  <div class="skill-points">ОЧКИ: <span id="skillPoints">0</span></div>
  <div id="skillTabs">
    <button id="tabAbilities" onclick="switchSkillTab('abilities')" type="button">СПОСОБНОСТИ</button>
    <button id="tabAttack" onclick="switchSkillTab('attack')" type="button">АТАКА (ЛКМ)</button>
  </div>
  <div class="skill-columns" id="skillColumns"></div>
  <div class="close-hint">Нажми E чтобы закрыть</div>
</div>

<script>
const cv = document.getElementById('game');
const ctx = cv.getContext('2d');
ctx.imageSmoothingEnabled = false;

let W = 0, H = 0;
function resizeCanvas() {
  cv.width = window.innerWidth;
  cv.height = window.innerHeight;
  W = cv.width;
  H = cv.height;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

const mini = document.getElementById('minimap');
const mctx = mini.getContext('2d');
mctx.imageSmoothingEnabled = false;

let audioCtx = null;
function initAudio() { 
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') {
    audioCtx.resume();
  }
}

function playSoftPlasma(startFreq, endFreq, duration, volume) {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;

  const f1 = Math.max(60, Math.min(1600, startFreq));
  const f2 = Math.max(60, Math.min(1600, endFreq));

  const osc1 = audioCtx.createOscillator();
  const osc2 = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc1.type = 'sine';
  osc2.type = 'sine';

  osc1.frequency.setValueAtTime(f1, now);
  osc1.frequency.exponentialRampToValueAtTime(Math.max(100, f2), now + duration);

  const detuneMul = 1.015;
  osc2.frequency.setValueAtTime(f1 * detuneMul, now);
  osc2.frequency.exponentialRampToValueAtTime(Math.max(100, f2 * detuneMul), now + duration);

  osc1.connect(gain);
  osc2.connect(gain);
  gain.connect(audioCtx.destination);

  gain.gain.setValueAtTime(0, now);
  gain.gain.linearRampToValueAtTime(Math.min(0.06, volume), now + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.001, now + duration);

  osc1.start(now);
  osc2.start(now);
  osc1.stop(now + duration + 0.05);
  osc2.stop(now + duration + 0.05);
}

function playSound(type) {
  if (!audioCtx) return;
  const v = (x) => Math.min(0.06, Math.max(0.01, x));

  switch(type) {
    case 'shoot': {
      playSoftPlasma(120, 70, 0.06, v(0.018));
      setTimeout(() => playSoftPlasma(900, 420, 0.085, v(0.03)), 8);
      break;
    }
    case 'hit':
      playSoftPlasma(420, 160, 0.07, v(0.032));
      break;
    case 'melee': {
      playSoftPlasma(520, 240, 0.08, v(0.028));
      setTimeout(() => playSoftPlasma(780, 360, 0.12, v(0.03)), 20);
      break;
    }
    case 'ability1':
      playSoftPlasma(400, 1000, 0.15, v(0.05));
      setTimeout(() => playSoftPlasma(1000, 300, 0.2, v(0.05)), 100);
      break;

document.addEventListener('keydown', e => {
  const k = e.key.toLowerCase();
  keys[k] = true;
  if (k === 'shift') tryDash();
  if (k === '1') tryAbility1();
  if (k === '2') tryAbility2();
  if (k === '3') tryUlt();
  if (k === 'e' || k === 'у') { e.preventDefault(); toggleSkillMenu(); }
  if (k === 'f' || k === 'а') { if (pendingPickup) takePickup(); }
  if (k === 'escape') { if (skillMenuOpen) { toggleSkillMenu(); } else if (pendingPickup) { skipPickup(); } }
  if (e.code === 'Space') { e.preventDefault(); if (!player.charging) tryAttack(); }
});
document.addEventListener('keyup', e => {
  const k = e.key.toLowerCase();
  keys[k] = false;
  if (e.button === 0 && playerClass === 'tech' && player.charging) fireCharged();
});
cv.addEventListener('mousemove', e => {
  const r = cv.getBoundingClientRect();
  mouse.x = (e.clientX - r.left) * (W / r.width) + camera.x;
  mouse.y = (e.clientY - r.top) * (H / r.height) + camera.y;
});
cv.addEventListener('mousedown', e => {
  if (e.button === 0) {
    mouse.down = true;
  }
  if (e.button === 2) {
    e.preventDefault();
    if (playerClass === 'melee') {
      throwKnife();
    } else if (playerClass === 'tech') {
      techieShield.active = true;
      techieShield.broken = false;
    }
  }
});
cv.addEventListener('mouseup', e => {
  if (e.button === 0) {
    mouse.down = false;
  }
  if (e.button === 2) {
    if (playerClass === 'tech') {
      techieShield.active = false;
      if (techieShield.hp <= 0) {
        techieShield.broken = true;
        techieShield.cooldown = 180;
      }
    }
  }
});
cv.addEventListener('contextmenu', e => e.preventDefault());

function toggleSkillMenu() {
  if (!gameRunning) return;
  skillMenuOpen = !skillMenuOpen;
  const menu = document.getElementById('skillMenu');
  if (skillMenuOpen) {
    playSound('ui_menu_open');
    gamePaused = true;
    menu.classList.add('show');
    renderSkillTree();
  } else {
    playSound('ui_menu_close');
    gamePaused = false;
    menu.classList.remove('show');
  }
}

function getSkillLevel(id) { return player.skills[id] || 0; }

let currentSkillTab = 'abilities';

function getSkillBonus(key) {
  let total = 0;
  const tree = skillTrees[playerClass];
  if (!tree) return 0;
  tree.forEach(branch => {
    branch.skills.forEach(skill => {
      if (skill.bonus && skill.bonus[key]) {
        total += skill.bonus[key] * getSkillLevel(skill.id);
      }
    });
  });
  return total;
}

function getAttackBonus(key) {
  let total = 0;
  const tree = attackTrees[playerClass];
  if (!tree) return 0;
  tree.forEach(branch => {
    branch.skills.forEach(skill => {
      if (skill.bonus && skill.bonus[key]) {
        total += skill.bonus[key] * getSkillLevel(skill.id);
      }
    });
  });
  return total;
}

function upgradeSkill(skill) {
  if (player.skillPoints < skill.cost) {
    playSound('ui_error');
    return;
  }
  const lvl = getSkillLevel(skill.id);
  if (lvl >= skill.max) {
    playSound('ui_skill_maxed');
    return;
  }
  player.skillPoints -= skill.cost;
  player.skills[skill.id] = lvl + 1;
  playSound('ui_skill_buy');
  renderSkillTree();
}

function renderSkillTree() {
  document.getElementById('skillPoints').textContent = player.skillPoints;

  const tabAbilities = document.getElementById('tabAbilities');
  const tabAttack = document.getElementById('tabAttack');
  if (tabAbilities) tabAbilities.classList.toggle('active', currentSkillTab === 'abilities');
  if (tabAttack) tabAttack.classList.toggle('active', currentSkillTab === 'attack');

  const skillMenu = document.getElementById('skillMenu');
  if (skillMenu) skillMenu.classList.toggle('attackMode', currentSkillTab === 'attack');

  const container = document.getElementById('skillColumns');
  container.innerHTML = '';

  const tree = currentSkillTab === 'abilities' ? skillTrees[playerClass] : attackTrees[playerClass];
  if (!tree) return;

  if (currentSkillTab === 'attack') {
    const branch = tree[0];
    if (!branch || !branch.skills) return;

    const allSkills = branch.skills;
    const topCount = Math.min(3, allSkills.length);
    const bottomCount = Math.min(6 - topCount, Math.max(0, allSkills.length - topCount));

    const topSkills = allSkills.slice(0, topCount);
    const bottomSkills = allSkills.slice(topCount, topCount + bottomCount).slice().reverse();

    function createSkillNodeElementForSnake(skill) {
      const lvl = getSkillLevel(skill.id);
      const isMaxed = lvl >= skill.max;
      const idxInAll = allSkills.findIndex(s => s.id === skill.id);
      const prevId = idxInAll > 0 ? allSkills[idxInAll - 1].id : null;
      const prevUnlocked = idxInAll === 0 || (prevId && getSkillLevel(prevId) > 0);
      const canAfford = player.skillPoints >= skill.cost;

      const node = document.createElement('div');
      node.className = 'skill-node' + (isMaxed ? ' maxed' : (!prevUnlocked ? ' locked' : (lvl > 0 ? ' unlocked' : '')));
      node.innerHTML = `<div class="sn-name">${skill.name}</div><div class="sn-desc">${skill.desc}</div><div class="sn-level">Ур. ${lvl}/${skill.max}</div><div class="sn-cost">${isMaxed ? 'МАКС' : 'ЦЕНА: ' + skill.cost + ' ОЧ.'}</div>`;

      if (!isMaxed && prevUnlocked && canAfford) {
        node.onmouseover = () => playSound('ui_hover');
        node.onclick = () => upgradeSkill(skill);
      }
      return node;
    }

    const topRow = document.createElement('div');
    topRow.className = 'skill-row top';
    topSkills.forEach((skill, idx) => {
      const col = document.createElement('div');
      col.className = 'skill-col';
      const title = document.createElement('div');
      title.className = 'skill-col-title';
      title.textContent = idx === 0 ? branch.title : '';
      col.appendChild(title);
      const nodeWrap = document.createElement('div');
      nodeWrap.style.position = 'relative';
      nodeWrap.style.zIndex = '1';
      nodeWrap.appendChild(createSkillNodeElementForSnake(skill));
      col.appendChild(nodeWrap);
      if (idx < topSkills.length - 1) {
        const line = document.createElement('div');
        line.className = 'skill-connector-line h-line right' + (getSkillLevel(topSkills[idx].id) > 0 ? ' unlocked' : '');
        col.appendChild(line);
      }
      topRow.appendChild(col);
    });
    container.appendChild(topRow);

    const bottomRow = document.createElement('div');
    bottomRow.className = 'skill-row bottom';
    bottomSkills.forEach((skill, idx) => {
      const col = document.createElement('div');
      col.className = 'skill-col';
      const title = document.createElement('div');
      title.className = 'skill-col-title';
      title.textContent = '';
      col.appendChild(title);
      const nodeWrap = document.createElement('div');
      nodeWrap.style.position = 'relative';
      nodeWrap.style.zIndex = '1';
      nodeWrap.appendChild(createSkillNodeElementForSnake(skill));
      col.appendChild(nodeWrap);
      if (idx < bottomSkills.length - 1) {
        const line = document.createElement('div');
        line.className = 'skill-connector-line h-line right' + (getSkillLevel(bottomSkills[idx].id) > 0 ? ' unlocked' : '');
        col.appendChild(line);
      }
      bottomRow.appendChild(col);
    });
    container.appendChild(bottomRow);

    if (topSkills.length > 0 && bottomSkills.length > 0) {
      const rightTop = topSkills[topSkills.length - 1];
      const rightBottom = bottomSkills[0];
      const isUnlocked = getSkillLevel(rightTop.id) > 0;
      const lastTopCol = topRow.children[topRow.children.length - 1];
      if (lastTopCol) {
        const corner = document.createElement('div');
        corner.className = 'corner-line top-right' + (isUnlocked ? ' unlocked' : '');
        lastTopCol.appendChild(corner);
      }
    }
    return;
  }

  tree.forEach(branch => {
    const col = document.createElement('div');
    col.className = 'skill-col';
    const title = document.createElement('div');
    title.className = 'skill-col-title';
    title.textContent = branch.title;
    col.appendChild(title);
    branch.skills.forEach((skill, idx) => {
      if (idx > 0) {
        const conn = document.createElement('div');
        conn.className = 'skill-connector' + (getSkillLevel(branch.skills[idx-1].id) > 0 ? ' unlocked' : '');
        col.appendChild(conn);
      }
      const lvl = getSkillLevel(skill.id);
      const isMaxed = lvl >= skill.max;
      const prevUnlocked = idx === 0 || getSkillLevel(branch.skills[idx-1].id) > 0;
      const canAfford = player.skillPoints >= skill.cost;
      const node = document.createElement('div');
      node.className = 'skill-node' + (isMaxed ? ' maxed' : (!prevUnlocked ? ' locked' : (lvl > 0 ? ' unlocked' : '')));
      node.innerHTML = `<div class="sn-name">${skill.name}</div><div class="sn-desc">${skill.desc}</div><div class="sn-level">Ур. ${lvl}/${skill.max}</div><div class="sn-cost">${isMaxed ? 'МАКС' : 'ЦЕНА: ' + skill.cost + ' ОЧ.'}</div>`;
      if (!isMaxed && prevUnlocked && canAfford) {
        node.onmouseover = () => playSound('ui_hover');
        node.onclick = () => upgradeSkill(skill);
      }
      col.appendChild(node);
    });
    container.appendChild(col);
  });
}

function spawnEnemy() {
  const availableTypes = enemyTypes.slice(0, Math.min(enemyTypes.length, 1 + Math.floor(survivalTime / 120)));
  const type = availableTypes[Math.floor(Math.random() * availableTypes.length)];
  const angle = Math.random() * Math.PI * 2;
  const dist = 300 + Math.random() * 400;
  const totalImplants = Object.values(player.implants).reduce((a, b) => a + b, 0);
  const hpMult = 1 + (survivalTime / 180) * 0.5 + totalImplants * 0.12;
  const dmgMult = 1 + totalImplants * 0.10;
  const xpMult = 1 + totalImplants * 0.04;
  enemies.push({
    x: player.x + Math.cos(angle) * dist, y: player.y + Math.sin(angle) * dist,
    type: { ...type, dmg: Math.floor(type.dmg * dmgMult), xp: Math.floor(type.xp * xpMult) },
    hp: type.hp * hpMult, maxHp: type.hp * hpMult, size: type.size, attackCd: 0, hitFlash: 0
  });
}

function getPlayerStats() {
  const c = classes[playerClass];
  return {
    attackCd: Math.max(1, Math.floor(c.attackCd / (1 + player.stats.atkSpeedPct / 100))),
    dmg: Math.floor((c.dmg + player.level * 3) * (1 + player.stats.dmgPct / 100)),
    range: c.range * (1 + player.stats.rangePct / 100),
    qCd: Math.floor(c.qCd * (1 - player.stats.qCdPct / 100)),
    eCd: Math.floor(c.eCd * (1 - player.stats.abilityCdPct / 100)),
    ultCd: Math.floor(c.ultCd * (1 - player.stats.abilityCdPct / 100)),
    atkSpeedMult: 1 + player.stats.atkSpeedPct / 100
  };
}

function applyImplantStats() {
  player.stats = { dmgPct:0, maxHpPct:0, defensePct:0, atkSpeedPct:0, rangePct:0, hpRegenPct:0, abilitiesCdPct:0, ultCdPct:0, qCdPct:0, luckPct:0 };
  for (const [id, count] of Object.entries(player.implants)) {
    const impl = IMPLANT_TYPES.find(i => i.id === id);
    if (impl) player.stats[impl.stat] += impl.base * Math.min(count, impl.maxStacks);
  }
  player.stats.defensePct = Math.min(50, player.stats.defensePct);
  player.maxHp = Math.floor((100 + (player.level - 1) * 15) * (1 + player.stats.maxHpPct / 100));
  player.hp = Math.min(player.hp, player.maxHp);
  updateImplantUI();
}

function addImplant(id) {
  const impl = IMPLANT_TYPES.find(i => i.id === id);
  if (!impl) return false;
  const currentCount = player.implants[id] || 0;
  const uniqueTypes = Object.keys(player.implants).length;
  if (currentCount === 0 && uniqueTypes >= 3 && !player.implants[id]) {
    showMsg('МАКС 3 ТИПА ИМПЛАНТОВ!', '#f00'); return false;
  }
  player.implants[id] = currentCount + 1;
  applyImplantStats();
  showMsg('ПОЛУЧЕН: ' + impl.name + ' x' + player.implants[id], impl.color);
  return true;
}

function tryAttack() {
  if (!gameRunning || gamePaused || player.attackCd > 0) return;

  const stats = getPlayerStats();
  const c = classes[playerClass];

  const atkDmgBonus = 1 + getAttackBonus('atkDmg');
  const atkSpeedBonus = 1 + getAttackBonus('atkSpeed');
  const atkRangeBonus = 1 + getAttackBonus('atkRange');
  const atkCritChance = getAttackBonus('atkCrit');
  const atkCritDmg = 1 + getAttackBonus('atkCritDmg');

  const hasPierce = getSkillLevel(playerClass === 'melee' ? 'm_atk_pierce' : (playerClass === 'magic' ? 'ma_atk_chain' : 't_atk_pierce')) > 0;
  const hasLifesteal = getSkillLevel(playerClass === 'melee' ? 'm_atk_lifesteal' : null) > 0;
  const atkLifesteal = getAttackBonus('atkLifesteal');
  const hasDouble = getSkillLevel(playerClass === 'melee' ? 'm_atk_double' : (playerClass === 'magic' ? 'ma_atk_double' : 't_atk_overheat')) > 0;

  player.attackCd = Math.floor(stats.attackCd / Math.max(0.6, atkSpeedBonus));
  player.angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);

  const doHit = (e, baseDmg) => {
    const isCrit = Math.random() < atkCritChance;
    const finalDmg = isCrit ? baseDmg * atkCritDmg : baseDmg;
    damageEnemy(e, finalDmg, isCrit);
    if (hasLifesteal && atkLifesteal > 0) {
      const heal = Math.max(1, Math.floor(finalDmg * atkLifesteal));
      player.hp = Math.min(player.maxHp, player.hp + heal);
    }
    return isCrit;
  };

  const maybeSecond = () => {
    if (hasDouble && Math.random() < 0.2) return true;
    return false;
  };

  if (playerClass === 'melee') {
    // ЭДЖРАННЕР - ЛКМ: Анимированный разрез мечом
    edgerunnerSlashAnim = 12; // длительность анимации в кадрах
    edgerunnerSlashDir *= -1;
    shake = 4;
    
    // Проверка попаданий по дуге (каждый враг получает не более 1 попадания за взмах)
    const slashRadius = stats.range * atkRangeBonus;
    const arcAngle = Math.PI * 0.6; // ~108 градусов
    const startAngle = player.angle - arcAngle/2 + (edgerunnerSlashDir > 0 ? 0 : arcAngle);
    const hitEnemies = [];
    
    for (let i = 0; i <= 12; i++) {
      const progress = i / 12;
      const a = startAngle + arcAngle * progress * edgerunnerSlashDir;
      const ex = player.x + Math.cos(a) * slashRadius;
      const ey = player.y + Math.sin(a) * slashRadius;
      
      enemies.forEach(e => {
        if (e.dead || hitEnemies.includes(e)) return;
        if (dist(e.x, e.y, ex, ey) < 40 + e.size * 0.5) {
          hitEnemies.push(e);
          doHit(e, stats.dmg * atkDmgBonus);
          // ОТБРАСЫВАНИЕ (навык из дерева атаки)
          if (getSkillLevel('m_atk_knockback') > 0) {
            e.x += Math.cos(player.angle) * 40;
            e.y += Math.sin(player.angle) * 40;
          }
        }
      });
    }
    
    // ДВОЙНОЙ УДАР: 20% шанс повторить урон по задетым врагам
    if (hasDouble && Math.random() < 0.2) {
      hitEnemies.forEach(e => { if (!e.dead) doHit(e, stats.dmg * atkDmgBonus); });
    }
    
    // Частицы разреза
    for (let i = 0; i < 15; i++) {
      const progress = i / 15;
      const a = startAngle + arcAngle * progress * edgerunnerSlashDir;
      particles.push({ 
        x: player.x + Math.cos(a) * slashRadius * 0.5, 
        y: player.y + Math.sin(a) * slashRadius * 0.5, 
        vx: Math.cos(a) * 2 + (Math.random()-0.5)*3,

function tryDash() {
  if (!gameRunning || gamePaused || player.dashCd > 0 || player.dashDur > 0) return;
  const stats = getPlayerStats();
  player.dashCd = stats.qCd; player.dashDur = 15;
  let dx = 0, dy = 0;
  if (keys['w'] || keys['ц']) dy -= 1;
  if (keys['s'] || keys['ы']) dy += 1;
  if (keys['a'] || keys['ф']) dx -= 1;
  if (keys['d'] || keys['в']) dx += 1;
  if (dx === 0 && dy === 0) { dx = Math.cos(player.angle); dy = Math.sin(player.angle); }
  else { const l = Math.hypot(dx,dy); dx /= l; dy /= l; }
  player.dashAngle = Math.atan2(dy, dx);
  player.invuln = 20; shake = 3; playSound('charge');
  for (let i = 0; i < 15; i++) particles.push({ x: player.x, y: player.y, vx: -dx*2 + (Math.random()-0.5), vy: -dy*2 + (Math.random()-0.5), life: 20, color: '#0ff', size: 3 });
}

function damageEnemy(e, dmg, isCrit = false) {
  // Защита игрока НЕ должна снижать урон, который игрок наносит врагам
  const vulnMult = (e.vulnerable && e.vulnPct) ? (1 + e.vulnPct) : 1;
  const reduced = Math.max(1, dmg * vulnMult);
  e.hp -= reduced;
  e.hitFlash = isCrit ? 15 : 8;
  playSound(isCrit ? 'crit' : 'hit');
  damageTexts.push({ x:e.x, y:e.y-10, text:Math.round(reduced), life:30, vy:-1, color:'#ff0' });
  for (let i = 0; i < (isCrit ? 10 : 5); i++) {
    particles.push({ x:e.x, y:e.y, vx:(Math.random()-0.5)*4*(isCrit ? 1.6 : 1), vy:(Math.random()-0.5)*4*(isCrit ? 1.6 : 1), life:20, color: isCrit ? '#ff0' : e.type.color, size: isCrit ? 3 : 2 });
  }
  if (isCrit) shake = Math.max(shake, 7);
  if (e.hp <= 0) killEnemy(e);
}

function killEnemy(e) {
  e.dead = true; player.kills++;
  playSound('death');
  if (!e.type.towerMob) {
    player.xp += e.type.xp;
    if (player.ultCd <= 0) player.ultCharge = Math.min(player.ultMaxCharge, player.ultCharge + (e.type.boss ? 30 : 5));
  }
  shake = e.type.boss ? 15 : 5;
  for (let i = 0; i < 20; i++) particles.push({ x:e.x, y:e.y, vx:(Math.random()-0.5)*6, vy:(Math.random()-0.5)*6, life:40, color:e.type.color, size:3 });
  if (!e.type.towerMob) {
    const luckMult = 1 + player.stats.luckPct / 100;
    const dropOffset = () => (Math.random() - 0.5) * 50;
    if (Math.random() < 0.25 * luckMult) dropImplant(e.x + dropOffset(), e.y + dropOffset());
    if (Math.random() < 0.3) pickups.push({ x:e.x + dropOffset(), y:e.y + dropOffset(), type:'hp', life:600 });
  }
  checkLevelUp();
}

function dropImplant(x, y) {
  const ownedTypes = Object.keys(player.implants);
  let impl = null;
  if (ownedTypes.length > 0 && Math.random() < 0.6) {
    impl = IMPLANT_TYPES.find(i => i.id === ownedTypes[Math.floor(Math.random() * ownedTypes.length)]);
  }
  if (!impl) impl = IMPLANT_TYPES[Math.floor(Math.random() * IMPLANT_TYPES.length)];
  if (!impl) return;
  pickups.push({ x, y, type: 'implant', implantId: impl.id, life: 600 });
}

function checkLevelUp() {
  let safetyCounter = 0;
  while (player.xp >= player.xpNext && safetyCounter < 100) {
    player.xp -= player.xpNext; player.level++;
    if (player.level % 2 === 0) player.skillPoints++;
    player.xpNext = Math.max(50, Math.floor(player.xpNext * 1.4));
    applyImplantStats();
    player.hp = player.maxHp;
    showMsg('УРОВЕНЬ ' + player.level + (player.level % 2 === 0 ? '! +1 ОЧКО' : ''), '#ff0');
    playSound('levelup');
    shake = 8; safetyCounter++;
  }
}

function explode(x, y, radius, dmg, color) {
  enemies.forEach(e => {
    if (!e.dead && dist(x, y, e.x, e.y) < radius) {
      damageEnemy(e, dmg * (1 - dist(x, y, e.x, e.y) / radius));
    }
  });
  for (let i = 0; i < 30; i++) {
    const a = Math.random() * Math.PI * 2;
    particles.push({ x: x, y: y, vx: Math.cos(a) * (Math.random() * 6 + 2), vy: Math.sin(a) * (Math.random() * 6 + 2), life: 30, color: color, size: 3 + Math.random()*2 });
  }
  shake = Math.max(shake, 8);
  playSound('explosion');
}

function update() {
  if (!gameRunning || gamePaused) return;
  gameTimeCounter++;
  if (gameTimeCounter >= 60) { gameTimeCounter = 0; survivalTime++; }
  
  let dx = 0, dy = 0;
  if (keys['w'] || keys['ц']) dy -= 1;
  if (keys['s'] || keys['ы']) dy += 1;
  if (keys['a'] || keys['ф']) dx -= 1;
  if (keys['d'] || keys['в']) dx += 1;
  
  if (player.dashDur > 0) {
    player.x += Math.cos(player.dashAngle) * 12;
    player.y += Math.sin(player.dashAngle) * 12;
    player.dashDur--;
    particles.push({ x: player.x, y: player.y, vx: 0, vy: 0, life: 10, color: '#0ff', size: player.size });
  } else if (dx || dy) {
    const l = Math.hypot(dx,dy);
    player.x += (dx/l) * player.speed;
    player.y += (dy/l) * player.speed;
  }
  
  player.x = Math.max(player.size, Math.min(WORLD_W - player.size, player.x));
  player.y = Math.max(player.size, Math.min(WORLD_H - player.size, player.y));
  camera.x = Math.max(0, Math.min(WORLD_W - W, player.x - W/2));
  camera.y = Math.max(0, Math.min(WORLD_H - H, player.y - H/2));
  player.angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);
  
if (player.attackCd > 0) player.attackCd--;
  if (player.dashCd > 0) player.dashCd--;
  if (player.abilityCd1 > 0) player.abilityCd1--;
  if (player.abilityCd2 > 0) player.abilityCd2--;
  if (player.ultCd > 0) player.ultCd--;
  if (player.invuln > 0) player.invuln--;
  if (player.tornadoActive > 0) player.tornadoActive--;
  if (player.ultActive > 0) player.ultActive--;
  if (scatterShotActive > 0) scatterShotActive--;
  railgunBeams.forEach(b => b.life--);
  railgunBeams = railgunBeams.filter(b => b.life > 0);

  // ЭДЖРАННЕР: Ножи (ПКМ) - перезарядка
  if (edgerunnerKnifeRecharge > 0) {
    edgerunnerKnifeRecharge--;
    if (edgerunnerKnifeRecharge === 0) {
      edgerunnerKnifeCharges = 3;
    }
  }

  // ЭДЖРАННЕР: Анимация разрез
  if (edgerunnerSlashAnim > 0) edgerunnerSlashAnim--;

  // ЭДЖРАННЕР: Ножи (ПКМ) - обновление позиции и проверка попаданий
  edgerunnerKnives.forEach(knife => {
    knife.x += knife.vx;
    knife.y += knife.vy;
    knife.life--;
    knife.rotation += 0.3; // вращение ножа
  });
  
// Проверка попаданий ножей
  const hasKnifePierce = getSkillLevel('m_a2_pierce') > 0;
  edgerunnerKnives.forEach(knife => {
    enemies.forEach(e => {
      if (e.dead) return;
      if (dist(e.x, e.y, knife.x, knife.y) < e.size + 6) {
        const isCrit = Math.random() < getAttackBonus('atkCrit');
        const finalDmg = isCrit ? knife.dmg * (1 + getAttackBonus('atkCritDmg')) : knife.dmg;
        damageEnemy(e, finalDmg, isCrit);
        if (!hasKnifePierce) knife.life = 0;
        
        // партиклы при попадании
        for (let i = 0; i < 8; i++) {
          particles.push({ x: e.x, y: e.y, vx: (Math.random()-0.5)*4, vy: (Math.random()-0.5)*4, life: 15, color: '#0ff', size: 3 });
        }
      }
    });
  });
  edgerunnerKnives = edgerunnerKnives.filter(k => k.life > 0);

  // НЕТРАННЕР: Моноструна (хлыст/змейка)
  if (netrunnerMonowire) {
    netrunnerMonowire.life--;
    
    // Фазы анимации: 0-8 кадр = вылет, 8-12 = удержание, 12-15 = затухание
    const totalLife = 15;
    const extendFrames = 8;
    const holdFrames = 4;
    const progress = 1 - netrunnerMonowire.life / totalLife; // 0 to 1
    
    if (progress < extendFrames / totalLife) {
      // Фаза вылета
      const phaseProgress = progress / (extendFrames / totalLife);
      netrunnerMonowire.length = netrunnerMonowire.maxLength * phaseProgress;
      netrunnerMonowire.waveOffset = (netrunnerMonowire.waveOffset || 0) + 0.25;
    } else if (progress < (extendFrames + holdFrames) / totalLife) {
      // Фаза удержания - волна идет
      netrunnerMonowire.length = netrunnerMonowire.maxLength;
      netrunnerMonowire.waveOffset = (netrunnerMonowire.waveOffset || 0) + 0.3;
    } else {
      // Фаза затухания - хвост исчезает первым
      netrunnerMonowire.waveOffset = (netrunnerMonowire.waveOffset || 0) + 0.2;
    }
    
    // Проверка попаданий по сегментам хлыста
    const segments = netrunnerMonowire.segments || 16;
    for (let i = 0; i <= segments; i++) {
      const segProgress = i / segments;
      // Основной угол + волна по длине
      const waveAmp = 0.35 * (1 - segProgress * 0.5); // волна больше у основания
      const waveAngle = Math.sin(segProgress * Math.PI * 3 + (netrunnerMonowire.waveOffset || 0)) * waveAmp;
      const segAngle = netrunnerMonowire.angle + waveAngle;
      const segLen = netrunnerMonowire.length * segProgress;
      const segX = netrunnerMonowire.x + Math.cos(segAngle) * segLen;
      const segY = netrunnerMonowire.y + Math.sin(segAngle) * segLen;
      
      enemies.forEach(e => {
        if (e.dead) return;
        if (dist(e.x, e.y, segX, segY) < 14) {
          if (!netrunnerMonowire.targetsHit.has(e)) {
            netrunnerMonowire.targetsHit.add(e);
            damageEnemy(e, Math.floor(netrunnerMonowire.damage));
            
            if (getSkillLevel('ma_atk_slow') > 0) {
              e.slowTimer = 60;
            }
            if (getSkillLevel('ma_atk_burn') > 0) {
              e.burning = true;
              e.burnTimer = 180;
              e.burnDmg = Math.floor(netrunnerMonowire.damage * 0.15);
            }
          }
        }
      });
    }
    
    if (netrunnerMonowire.life <= 0) {
      netrunnerMonowire = null;
    }
  }

  // НЕТРАННЕР: КИБЕР-ДЕМОН (способность 2)
  if (netrunnerCyberDemon) {
    netrunnerCyberDemon.life--;
    netrunnerCyberDemon.angle += netrunnerCyberDemon.orbitSpeed;
    
    // Движение по орбите вокруг игрока
    netrunnerCyberDemon.x = player.x + Math.cos(netrunnerCyberDemon.angle) * netrunnerCyberDemon.orbitRadius;
    netrunnerCyberDemon.y = player.y + Math.sin(netrunnerCyberDemon.angle) * netrunnerCyberDemon.orbitRadius - 50;
    
    // Поиск цели
    if (!netrunnerCyberDemon.target || netrunnerCyberDemon.target.dead) {
      let closest = null;
      let closestDist = 250;
      enemies.forEach(e => {
        if (!e.dead && dist(netrunnerCyberDemon.x, netrunnerCyberDemon.y, e.x, e.y) < closestDist) {
          closest = e;
          closestDist = dist(netrunnerCyberDemon.x, netrunnerCyberDemon.y, e.x, e.y);
        }
      });
      netrunnerCyberDemon.target = closest;
    }
    
    // Атака
    const a2DmgBonus = 1 + getSkillBonus('a2Dmg');
    const a2SpeedBonus = 1 + getSkillBonus('a2Speed');
    netrunnerCyberDemon.attackCd--;
    if (netrunnerCyberDemon.attackCd <= 0 && netrunnerCyberDemon.target) {
      damageEnemy(netrunnerCyberDemon.target, Math.floor(netrunnerCyberDemon.dmg * a2DmgBonus));
      netrunnerCyberDemon.attackCd = Math.floor(24 / a2SpeedBonus);
      
      // Particles атаки
      const angle = Math.atan2(netrunnerCyberDemon.target.y - netrunnerCyberDemon.y, 
                               netrunnerCyberDemon.target.x - netrunnerCyberDemon.x);
      for (let i = 0; i < 10; i++) {
        particles.push({
          x: netrunnerCyberDemon.x,
          y: netrunnerCyberDemon.y,
          vx: Math.cos(angle) * 3 + (Math.random()-0.5)*2,
          vy: Math.sin(angle) * 3 + (Math.random()-0.5)*2,
          life: 30,
          color: '#a0f',
          size: 3
        });
      }
    }
    
    if (netrunnerCyberDemon.life <= 0) {
      netrunnerCyberDemon = null;
    }
  }

  // НЕТРАННЕР: ЧЁРНАЯ СТЕНА (УЛЬТА)
  if (netrunnerBlackwallActive) {
    netrunnerBlackwallTimer--;
    
    // Наносим урон всем взломанным врагам
    enemies.forEach(e => {
      if (e.blackwallHacked && !e.dead) {
        if (netrunnerBlackwallTimer % 20 === 0) { // Урон каждые 0.33 сек
          damageEnemy(e, e.blackwallDmg);
          
          // Цепная молния
          enemies.forEach(e2 => {
            if (e !== e2 && !e2.dead && dist(e.x, e.y, e2.x, e2.y) < 250) {
              lightningChains.push({
                x1: e.x, y1: e.y,
                x2: e2.x, y2: e2.y,
                life: 30,
                color: '#f00'
              });
            }
          });
        }
      }
    });
    
    if (netrunnerBlackwallTimer <= 0) {
      netrunnerBlackwallActive = false;
      enemies.forEach(e => { e.blackwallHacked = false; });
    }
  }

  // ЭДЖРАННЕР: ВРАЩАЮЩИЙСЯ КЛИНОК (1)
  if (edgerunnerWhirlwind && edgerunnerWhirlwind.active) {
    edgerunnerWhirlwind.life--;
    edgerunnerWhirlwind.angle += 0.3;
    edgerunnerWhirlwind.attackCd--;

    // Урон по ближайшим врагам каждые 8 кадров
    if (edgerunnerWhirlwind.attackCd <= 0) {
      edgerunnerWhirlwind.attackCd = 8;
      enemies.forEach(e => {
        if (!e.dead && dist(e.x, e.y, player.x, player.y) < edgerunnerWhirlwind.radius) {
          damageEnemy(e, edgerunnerWhirlwind.dmg);
          for (let j = 0; j < 4; j++) {
            particles.push({
              x: e.x + (Math.random()-0.5)*10,
              y: e.y + (Math.random()-0.5)*10,
              vx: (Math.random()-0.5)*3,
              vy: (Math.random()-0.5)*3,
              life: 15,
              color: '#f0f',
              size: 2
            });
          }
        }
      });
    }

    // Частицы вращения
    if (edgerunnerWhirlwind.life % 3 === 0) {
      for (let i = 0; i < 2; i++) {
        const a = Math.random() * Math.PI * 2;
        particles.push({
          x: player.x + Math.cos(a) * edgerunnerWhirlwind.radius,
          y: player.y + Math.sin(a) * edgerunnerWhirlwind.radius,
          vx: Math.cos(a) * 2,
          vy: Math.sin(a) * 2,
          life: 10,
          color: '#f0f',
          size: 3
        });
      }
    }

    if (edgerunnerWhirlwind.life <= 0) {
      edgerunnerWhirlwind.active = false;
    }
  }

  // ЭДЖРАННЕР: ЭМИ-ГРАНАТЫ (2)
  edgerunnerEmpGrenades.forEach(grenade => {
    grenade.x += grenade.vx;
    grenade.y += grenade.vy;
    grenade.vx *= 0.95;
    grenade.vy *= 0.95;
    grenade.fuse--;

    // Частицы полёта
    if (grenade.fuse % 4 === 0) {
      particles.push({
        x: grenade.x,
        y: grenade.y,
        vx: (Math.random()-0.5)*2,
        vy: (Math.random()-0.5)*2,
        life: 10,
        color: '#ff0',
        size: 2
      });
    }

    if (grenade.fuse <= 0) {
      // Взрыв
      const hasCluster = getSkillLevel('e_a2_cluster') > 0;

      if (hasCluster && !grenade.isCluster) {
        // Кассетная граната - делится на 3
        for (let i = 0; i < 3; i++) {
          const angle = (Math.PI * 2 / 3) * i;
          edgerunnerEmpGrenades.push({
            x: grenade.x,
            y: grenade.y,
            vx: Math.cos(angle) * 4,
            vy: Math.sin(angle) * 4,
            fuse: 30,
            maxFuse: 30,
            dmg: Math.floor(grenade.dmg * 0.5),
            radius: grenade.radius * 0.7,
            stunDuration: grenade.stunDuration,
            isCluster: true
          });
        }
      } else {
        // Обычный взрыв
        enemies.forEach(e => {
          if (!e.dead && dist(e.x, e.y, grenade.x, grenade.y) < grenade.radius) {
            damageEnemy(e, grenade.dmg);
            e.stunTimer = Math.max(e.stunTimer || 0, grenade.stunDuration);
            // Частицы взрыва
            for (let i = 0; i < 15; i++) {
              const a = Math.random() * Math.PI * 2;
              particles.push({
                x: grenade.x + Math.cos(a) * 20,
                y: grenade.y + Math.sin(a) * 20,
                vx: Math.cos(a) * 4,
                vy: Math.sin(a) * 4,
                life: 25,
                color: '#ff0',
                size: 3
              });
            }
          }
        });
        shake = 5;
      }
    }
  });
  edgerunnerEmpGrenades = edgerunnerEmpGrenades.filter(g => g.fuse > 0);

  // ЭДЖРАННЕР: САНДЕВИСТАН (УЛЬТА)
  if (sandevistanActive) {
    sandevistanTimer--;
    
    // Увеличиваем скорость игрока
    const originalSpeed = player.speed;
    player.speed = 6; // +100%
    
    if (sandevistanTimer <= 0) {
      sandevistanActive = false;
      player.speed = 3;
      // Восстанавливаем скорость врагов
      enemies.forEach(e => {
        if (e.sandevistanSlowed && e.originalSpeed) {
          e.type.speed = e.originalSpeed;
          e.sandevistanSlowed = false;
        }
      });
      // Восстанавливаем скорость снарядов
      projectiles.forEach(p => {
        if (p.owner === 'enemy') {
          p.vx /= 0.15;
          p.vy /= 0.15;
        }
      });
    }
  }

  // Очистка статусов
  if (playerClass === 'tech') {
    // ТЕХНИК: ТУРЕЛЬ (1)
    if (techieTurret) {
      techieTurret.life--;
      techieTurret.shootCd--;

      // Поиск цели
      let closest = null;
      let closestDist = techieTurret.range;
      enemies.forEach(e => {
        if (!e.dead) {
          const d = dist(techieTurret.x, techieTurret.y, e.x, e.y);
          if (d < closestDist) {
            closest = e;
            closestDist = d;
          }
        }
      });

      // Поворот к цели
      if (closest) {
        techieTurret.angle = Math.atan2(closest.y - techieTurret.y, closest.x - techieTurret.x);

        // Стрельба
        if (techieTurret.shootCd <= 0) {
          projectiles.push({
            x: techieTurret.x,
            y: techieTurret.y,
            vx: Math.cos(techieTurret.angle) * 10,
            vy: Math.sin(techieTurret.angle) * 10,
            dmg: techieTurret.dmg,
            color: '#ff0',
            type: 'bullet',
            life: 60,
            size: 4,
            owner: 'player'
          });
          techieTurret.shootCd = techieTurret.shootInterval;
          playSound('turret');

          // Частицы выстрела
          for (let i = 0; i < 5; i++) {
            particles.push({
              x: techieTurret.x + Math.cos(techieTurret.angle) * 15,
              y: techieTurret.y + Math.sin(techieTurret.angle) * 15,
              vx: Math.cos(techieTurret.angle) * 3 + (Math.random()-0.5)*2,
              vy: Math.sin(techieTurret.angle) * 3 + (Math.random()-0.5)*2,
              life: 10,
              color: '#ff0',
              size: 2
            });
          }
        }
      }

      // Враги атакуют турель
      enemies.forEach(e => {
        if (!e.dead && dist(e.x, e.y, techieTurret.x, techieTurret.y) < 40 && e.attackCd <= 0) {
          techieTurret.hp -= e.type.dmg;
          e.attackCd = 40;
          // Частицы попадания
          for (let i = 0; i < 6; i++) {
            particles.push({
              x: techieTurret.x + (Math.random()-0.5)*20,
              y: techieTurret.y + (Math.random()-0.5)*20,
              vx: (Math.random()-0.5)*3,
              vy: (Math.random()-0.5)*3,
              life: 15,
              color: '#f80',
              size: 2
            });
          }
        }
      });

      if (techieTurret.life <= 0 || techieTurret.hp <= 0) {
        // Взрыв при уничтожении
        if (techieTurret.hp <= 0) {
          explode(techieTurret.x, techieTurret.y, 80, techieTurret.dmg * 2, '#ff0');
        }
        techieTurret = null;
      }
    }

    // ТЕХНИК: БОЕВОЙ ДРОН (2)
    if (techieCombatDrone) {
      techieCombatDrone.life--;
      techieCombatDrone.angle += 0.05;

      // Обновляем позиции дронов
      techieCombatDrone.drones.forEach((drone, idx) => {
        const droneAngle = techieCombatDrone.angle + drone.angleOffset;
        drone.x = player.x + Math.cos(droneAngle) * techieCombatDrone.orbitRadius;
        drone.y = player.y + Math.sin(droneAngle) * techieCombatDrone.orbitRadius - 50;

        // Поиск цели для каждого дрона
        let closest = null;
        let closestDist = techieCombatDrone.range;
        enemies.forEach(e => {
          if (!e.dead) {
            const d = dist(drone.x, drone.y, e.x, e.y);
            if (d < closestDist) {
              closest = e;
              closestDist = d;
            }
          }
        });

        // Стрельба
        techieCombatDrone.shootCd--;
        if (techieCombatDrone.shootCd <= 0 && closest) {
          const angle = Math.atan2(closest.y - drone.y, closest.x - drone.x);
          projectiles.push({
            x: drone.x,
            y: drone.y,
            vx: Math.cos(angle) * 12,
            vy: Math.sin(angle) * 12,
            dmg: techieCombatDrone.dmg,
            color: '#0ff',
            type: 'bullet',
            life: 50,
            size: 3,
            owner: 'player'
          });
          techieCombatDrone.shootCd = techieCombatDrone.shootInterval;

          // Частицы выстрела
          for (let i = 0; i < 4; i++) {
            particles.push({
              x: drone.x + Math.cos(angle) * 10,
              y: drone.y + Math.sin(angle) * 10,
              vx: Math.cos(angle) * 2 + (Math.random()-0.5)*2,
              vy: Math.sin(angle) * 2 + (Math.random()-0.5)*2,
              life: 8,
              color: '#0ff',
              size: 2
            });
          }
        }
      });

      if (techieCombatDrone.life <= 0) {
        techieCombatDrone = null;
      }
    }

    // ТЕХНИК: МЕХ-КОСТЮМ (УЛЬТА)
    if (techieExosuitActive) {
      techieExosuitTimer--;

      // Трейлы движения
      if (gameTimeCounter % 3 === 0) {
        techieExosuitTrail.push({ x: player.x, y: player.y, life: 20 });
      }
      techieExosuitTrail.forEach(t => t.life--);
      techieExosuitTrail = techieExosuitTrail.filter(t => t.life > 0);

      // Регенерация HP (если прокачано)
      if (getSkillLevel('t_u_regen') > 0) {
        if (gameTimeCounter % 60 === 0) {
          const heal = Math.floor(player.maxHp * 0.02);
          player.hp = Math.min(player.maxHp, player.hp + heal);
          if (heal > 0) {
            damageTexts.push({ x: player.x, y: player.y - 20, text: '+' + heal, life: 30, vy: -1, color: '#0f0' });
          }
        }
      }

      // Регенерация щита
      if (techieShield.hp < techieShield.maxHp && !techieShield.broken) {
        techieShield.hp = Math.min(techieShield.maxHp, techieShield.hp + 1);
      }

      // Увеличенный урон (применяется в tryAttack через модификатор)
      player.exosuitDmgMult = 1 + getSkillBonus('ultDmg');

      if (techieExosuitTimer <= 0) {
        techieExosuitActive = false;
        player.speed = player._baseSpeed || 3;
        classes.tech.attackCd = player._baseAttackCd || 32;
        player.exosuitImmune = false;
        player.exosuitDmgMult = 1;
        techieExosuitTrail = [];
      }
    }
    // Щит
    if (techieShield.cooldown > 0) {
      techieShield.cooldown--;
      if (techieShield.cooldown === 0) {
        techieShield.broken = false;
        techieShield.hp = techieShield.maxHp;
      }
    }
    
    if (techieShield.broken) {
      techieShield.regenTimer++;
      if (techieShield.regenTimer >= 180) { // 3 сек без урона
        techieShield.regenTimer = 0;
        techieShield.hp = Math.min(techieShield.maxHp, techieShield.hp + 1);
        if (techieShield.hp >= techieShield.maxHp) {
          techieShield.broken = false;
        }
      }
    }
    
    // Регенерация щита вне боя
    if (techieShield.hp < techieShield.maxHp && !techieShield.active && techieShield.cooldown === 0 && !techieShield.broken) {
      techieShield.regenTimer++;
      if (techieShield.regenTimer >= 60) {
        techieShield.hp = Math.min(techieShield.maxHp, techieShield.hp + 1);
      }
    } else {
      techieShield.regenTimer = 0;
    }
    
    // Пистолетные выстрелы
    techiePistolShots.forEach(shot => {
      shot.life--;
      shot.traveled += shot.speed;
      const sx = shot.x + Math.cos(shot.angle) * shot.traveled;
